<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="1000" fill="url(#bgGradient4)"/>
  
  <!-- Navbar -->
  <rect width="1400" height="70" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="60" cy="35" r="22" fill="url(#logoGradient4)"/>
  <text x="60" y="42" font-size="24" fill="white" text-anchor="middle" font-weight="bold">⚡</text>
  <text x="100" y="42" font-size="16" font-weight="bold" fill="#1a1a1a">JBE</text>
  <text x="400" y="42" font-size="14" fill="#333">Home</text>
  <text x="500" y="42" font-size="14" fill="#333">Shop</text>
  <text x="580" y="42" font-size="14" fill="#007BFF" font-weight="bold">Cart</text>
  <text x="650" y="42" font-size="14" fill="#333">Admin</text>
  <text x="1080" y="42" font-size="13" fill="#666">Welcome, Admin User</text>
  
  <!-- Page Title -->
  <text x="60" y="130" font-size="28" font-weight="bold" fill="#1a1a1a">Your Shopping Cart</text>
  <text x="60" y="155" font-size="13" fill="#666">3 items in cart</text>
  
  <!-- Left: Cart Items -->
  <g transform="translate(60, 180)">
    <!-- Cart Item 1 -->
    <rect x="0" y="0" width="750" height="140" fill="white" stroke="#e0e0e0" stroke-width="1" rx="16"/>
    
    <rect x="15" y="15" width="110" height="110" fill="#f5f5f5" rx="10"/>
    <text x="70" y="70" font-size="32" text-anchor="middle">💡</text>
    
    <text x="145" y="35" font-size="16" font-weight="bold" fill="#1a1a1a">LED Bulb 60W</text>
    <text x="145" y="60" font-size="12" fill="#666">Bright white light, long lasting</text>
    <text x="145" y="85" font-size="13" fill="#007BFF" font-weight="bold">₹299 each</text>
    
    <text x="420" y="60" font-size="13" fill="#666">Qty:</text>
    <rect x="460" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="478" y="68" font-size="14" text-anchor="middle">−</text>
    
    <rect x="505" y="48" width="35" height="30" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="523" y="68" font-size="14" font-weight="bold" text-anchor="middle">2</text>
    
    <rect x="550" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="568" y="68" font-size="14" text-anchor="middle">+</text>
    
    <text x="620" y="60" font-size="14" font-weight="bold" fill="#007BFF">Subtotal: ₹598</text>
    <text x="620" y="85" font-size="12" fill="#FF6B6B" cursor="pointer">🗑️ Remove</text>
  </g>
  
  <!-- Cart Item 2 -->
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="750" height="140" fill="white" stroke="#e0e0e0" stroke-width="1" rx="16"/>
    
    <rect x="15" y="15" width="110" height="110" fill="#f5f5f5" rx="10"/>
    <text x="70" y="70" font-size="32" text-anchor="middle">🧰</text>
    
    <text x="145" y="35" font-size="16" font-weight="bold" fill="#1a1a1a">Screwdriver Set</text>
    <text x="145" y="60" font-size="12" fill="#666">6-piece professional grade</text>
    <text x="145" y="85" font-size="13" fill="#007BFF" font-weight="bold">₹399 each</text>
    
    <text x="420" y="60" font-size="13" fill="#666">Qty:</text>
    <rect x="460" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="478" y="68" font-size="14" text-anchor="middle">−</text>
    
    <rect x="505" y="48" width="35" height="30" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="523" y="68" font-size="14" font-weight="bold" text-anchor="middle">1</text>
    
    <rect x="550" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="568" y="68" font-size="14" text-anchor="middle">+</text>
    
    <text x="620" y="60" font-size="14" font-weight="bold" fill="#007BFF">Subtotal: ₹399</text>
    <text x="620" y="85" font-size="12" fill="#FF6B6B" cursor="pointer">🗑️ Remove</text>
  </g>
  
  <!-- Cart Item 3 -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="750" height="140" fill="white" stroke="#e0e0e0" stroke-width="1" rx="16"/>
    
    <rect x="15" y="15" width="110" height="110" fill="#f5f5f5" rx="10"/>
    <text x="70" y="70" font-size="32" text-anchor="middle">🔩</text>
    
    <text x="145" y="35" font-size="16" font-weight="bold" fill="#1a1a1a">Bolt & Nut Kit</text>
    <text x="145" y="60" font-size="12" fill="#666">Assorted sizes, stainless steel</text>
    <text x="145" y="85" font-size="13" fill="#007BFF" font-weight="bold">₹149 each</text>
    
    <text x="420" y="60" font-size="13" fill="#666">Qty:</text>
    <rect x="460" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="478" y="68" font-size="14" text-anchor="middle">−</text>
    
    <rect x="505" y="48" width="35" height="30" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="523" y="68" font-size="14" font-weight="bold" text-anchor="middle">3</text>
    
    <rect x="550" y="48" width="35" height="30" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="568" y="68" font-size="14" text-anchor="middle">+</text>
    
    <text x="620" y="60" font-size="14" font-weight="bold" fill="#007BFF">Subtotal: ₹447</text>
    <text x="620" y="85" font-size="12" fill="#FF6B6B" cursor="pointer">🗑️ Remove</text>
  </g>
  
  <!-- Right: Order Summary -->
  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="470" height="480" fill="white" stroke="#e0e0e0" stroke-width="1" rx="16"/>
    
    <text x="30" y="35" font-size="18" font-weight="bold" fill="#1a1a1a">Order Summary</text>
    
    <line x1="30" y1="50" x2="440" y2="50" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Subtotal -->
    <text x="30" y="85" font-size="13" fill="#666">Subtotal</text>
    <text x="410" y="85" font-size="13" fill="#333" text-anchor="end">₹1,444</text>
    
    <!-- Shipping -->
    <text x="30" y="115" font-size="13" fill="#666">Shipping</text>
    <text x="410" y="115" font-size="13" fill="#4CAF50" font-weight="bold" text-anchor="end">FREE</text>
    
    <!-- Tax -->
    <text x="30" y="145" font-size="13" fill="#666">Tax (18%)</text>
    <text x="410" y="145" font-size="13" fill="#333" text-anchor="end">₹260</text>
    
    <line x1="30" y1="160" x2="440" y2="160" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Total -->
    <text x="30" y="195" font-size="16" font-weight="bold" fill="#1a1a1a">Total</text>
    <text x="410" y="195" font-size="22" font-weight="bold" fill="#007BFF" text-anchor="end">₹1,704</text>
    
    <!-- Coupon -->
    <rect x="30" y="220" width="380" height="40" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="8"/>
    <text x="50" y="247" font-size="12" fill="#999">Apply coupon code</text>
    
    <!-- Checkout Button -->
    <rect x="30" y="280" width="380" height="50" fill="#007BFF" rx="10"/>
    <text x="220" y="312" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Proceed to Checkout</text>
    
    <!-- Continue Shopping Button -->
    <rect x="30" y="350" width="380" height="50" fill="white" stroke="#007BFF" stroke-width="2" rx="10"/>
    <text x="220" y="382" font-size="16" font-weight="bold" fill="#007BFF" text-anchor="middle">Continue Shopping</text>
    
    <!-- Security Badge -->
    <rect x="30" y="420" width="380" height="40" fill="#E8F5E9" rx="8"/>
    <text x="50" y="450" font-size="12" fill="#4CAF50">🔒 Secure checkout | SSL encrypted</text>
  </g>
</svg>