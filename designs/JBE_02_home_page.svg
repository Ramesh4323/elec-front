<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="1000" fill="url(#bgGradient2)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="180" fill="#E3F2FD" opacity="0.3"/>
  <circle cx="1250" cy="850" r="220" fill="#FFE4CC" opacity="0.25"/>
  
  <!-- Navbar -->
  <rect width="1400" height="70" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Logo -->
  <circle cx="60" cy="35" r="22" fill="url(#logoGradient2)"/>
  <text x="60" y="42" font-size="24" fill="white" text-anchor="middle" font-weight="bold">⚡</text>
  <text x="100" y="42" font-size="16" font-weight="bold" fill="#1a1a1a">JBE</text>
  <text x="100" y="58" font-size="10" fill="#666">Jai Bhawani Electrical</text>
  
  <!-- Nav Menu -->
  <text x="400" y="42" font-size="14" fill="#333" font-weight="500">Home</text>
  <text x="500" y="42" font-size="14" fill="#333" font-weight="500">Shop</text>
  <text x="580" y="42" font-size="14" fill="#333" font-weight="500">Cart</text>
  <text x="650" y="42" font-size="14" fill="#333" font-weight="500">Admin</text>
  
  <!-- Right Side: Welcome + Cart -->
  <text x="1080" y="42" font-size="13" fill="#666">Welcome, Admin User</text>
  <circle cx="1280" cy="35" r="18" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1280" y="42" font-size="16" text-anchor="middle">👤</text>
  <circle cx="1330" cy="20" r="10" fill="#FF7A00"/>
  <text x="1330" y="25" font-size="10" fill="white" text-anchor="middle" font-weight="bold">2</text>
  
  <!-- Main Content -->
  <!-- Left Side Hero Section -->
  <g transform="translate(60, 130)">
    <!-- Premium Pill Badge -->
    <rect x="0" y="0" width="180" height="32" fill="#E3F2FD" rx="16" stroke="#007BFF" stroke-width="1.5"/>
    <text x="90" y="21" font-size="12" font-weight="bold" fill="#007BFF" text-anchor="middle">✨ Premium Store</text>
    
    <!-- Main Headline -->
    <text x="0" y="80" font-size="48" font-weight="bold" fill="#1a1a1a" line-height="1.2">Welcome to JBE</text>
    <text x="0" y="130" font-size="48" font-weight="bold" fill="#1a1a1a" line-height="1.2">Jai Bhawani</text>
    <text x="0" y="180" font-size="48" font-weight="bold" fill="#007BFF" line-height="1.2">Electrical & Hardware</text>
    
    <!-- Description -->
    <text x="0" y="240" font-size="16" fill="#666" line-height="1.6">Premium quality electrical components, tools, and</text>
    <text x="0" y="265" font-size="16" fill="#666" line-height="1.6">hardware supplies for residential and commercial</text>
    <text x="0" y="290" font-size="16" fill="#666" line-height="1.6">needs. Fast delivery and expert support.</text>
    
    <!-- Stats Row -->
    <rect x="0" y="340" width="530" height="80" fill="white" rx="16" stroke="#e0e0e0" stroke-width="1"/>
    
    <text x="30" y="370" font-size="20" font-weight="bold" fill="#007BFF">10+</text>
    <text x="30" y="395" font-size="12" fill="#666">Years Experience</text>
    
    <text x="200" y="370" font-size="20" font-weight="bold" fill="#007BFF">1000+</text>
    <text x="200" y="395" font-size="12" fill="#666">Happy Customers</text>
    
    <text x="380" y="370" font-size="20" font-weight="bold" fill="#007BFF">500+</text>
    <text x="380" y="395" font-size="12" fill="#666">Products</text>
    
    <!-- Buttons -->
    <rect x="0" y="460" width="200" height="50" fill="#007BFF" rx="12"/>
    <text x="100" y="491" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Shop Now</text>
    
    <rect x="240" y="460" width="200" height="50" fill="white" stroke="#007BFF" stroke-width="2" rx="12"/>
    <text x="340" y="491" font-size="16" font-weight="bold" fill="#007BFF" text-anchor="middle">Explore Products</text>
  </g>
  
  <!-- Right Side: Featured Product Card -->
  <g transform="translate(850, 150)">
    <rect x="0" y="0" width="450" height="500" fill="white" rx="24" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Product Image Placeholder -->
    <rect x="30" y="30" width="390" height="250" fill="#f5f5f5" rx="16"/>
    <text x="225" y="165" font-size="14" fill="#999" text-anchor="middle">Featured Product</text>
    <text x="225" y="185" font-size="48" text-anchor="middle">🔧</text>
    
    <!-- Badge -->
    <rect x="30" y="50" width="100" height="30" fill="#FF7A00" rx="8"/>
    <text x="80" y="70" font-size="12" font-weight="bold" fill="white" text-anchor="middle">NEW</text>
    
    <!-- Product Title -->
    <text x="30" y="320" font-size="20" font-weight="bold" fill="#1a1a1a">Premium Drill Set</text>
    
    <!-- Product Description -->
    <text x="30" y="350" font-size="13" fill="#666">Professional grade drill with</text>
    <text x="30" y="370" font-size="13" fill="#666">100+ accessories</text>
    
    <!-- Price -->
    <text x="30" y="410" font-size="24" font-weight="bold" fill="#007BFF">₹4,999</text>
    
    <!-- Rating -->
    <text x="30" y="445" font-size="13" fill="#FF9800">⭐⭐⭐⭐⭐ (245 reviews)</text>
    
    <!-- View Button -->
    <rect x="30" y="460" width="390" height="40" fill="#007BFF" rx="10"/>
    <text x="225" y="486" font-size="14" font-weight="bold" fill="white" text-anchor="middle">View Details</text>
  </g>
</svg>