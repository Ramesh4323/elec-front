<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="logoGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="700" y="40" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Reusable Component Library</text>
  
  <!-- NAVBAR COMPONENT -->
  <g transform="translate(50, 70)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#0B6E4F">Navbar Component</text>
    
    <rect x="0" y="15" width="320" height="60" fill="white" stroke="#e0e0e0" stroke-width="1" rx="8"/>
    
    <!-- Logo -->
    <circle cx="30" cy="45" r="16" fill="url(#logoGradient6)"/>
    <text x="30" y="52" font-size="18" fill="white" text-anchor="middle" font-weight="bold">⚡</text>
    
    <!-- Menu -->
    <text x="65" y="50" font-size="11" fill="#333">Home</text>
    <text x="110" y="50" font-size="11" fill="#333">Shop</text>
    <text x="155" y="50" font-size="11" fill="#333">Cart</text>
    <text x="200" y="50" font-size="11" fill="#333">Admin</text>
    
    <!-- Right Items -->
    <text x="260" y="50" font-size="10" fill="#666">Welcome</text>
    <circle cx="305" cy="45" r="12" fill="#f0f0f0" stroke="#e0e0e0"/>
    <text x="305" y="50" font-size="12" text-anchor="middle">👤</text>
  </g>
  
  <!-- PRODUCT CARD COMPONENT -->
  <g transform="translate(450, 70)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#0B6E4F">Product Card Component</text>
    
    <rect x="0" y="15" width="260" height="280" fill="white" stroke="#e0e0e0" stroke-width="1" rx="12"/>
    
    <!-- Image -->
    <rect x="12" y="27" width="236" height="130" fill="#f5f5f5" rx="8"/>
    <text x="130" y="95" font-size="32" text-anchor="middle">💡</text>
    
    <!-- Badge -->
    <rect x="12" y="35" width="60" height="22" fill="#FF7A00" rx="4"/>
    <text x="42" y="50" font-size="10" font-weight="bold" fill="white" text-anchor="middle">SALE</text>
    
    <!-- Title -->
    <text x="12" y="180" font-size="12" font-weight="bold" fill="#1a1a1a">LED Bulb 60W</text>
    <text x="12" y="200" font-size="11" fill="#666">Bright white light</text>
    
    <!-- Price -->
    <text x="12" y="225" font-size="14" font-weight="bold" fill="#007BFF">₹299</text>
    
    <!-- Rating -->
    <text x="12" y="248" font-size="11" fill="#FF9800">⭐⭐⭐⭐⭐</text>
    
    <!-- Buttons -->
    <rect x="12" y="260" width="107" height="30" fill="#007BFF" rx="6"/>
    <text x="65" y="280" font-size="11" font-weight="bold" fill="white" text-anchor="middle">View</text>
    
    <rect x="141" y="260" width="107" height="30" fill="white" stroke="#FF7A00" stroke-width="1.5" rx="6"/>
    <text x="194" y="280" font-size="16" text-anchor="middle">🛒</text>
  </g>
  
  <!-- BUTTON VARIANTS -->
  <g transform="translate(800, 70)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#0B6E4F">Button Variants</text>
    
    <!-- Primary Button -->
    <rect x="0" y="20" width="150" height="40" fill="#007BFF" rx="8"/>
    <text x="75" y="47" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Primary</text>
    
    <!-- Secondary Button -->
    <rect x="0" y="70" width="150" height="40" fill="white" stroke="#007BFF" stroke-width="2" rx="8"/>
    <text x="75" y="97" font-size="12" font-weight="bold" fill="#007BFF" text-anchor="middle">Secondary</text>
    
    <!-- Accent Button -->
    <rect x="0" y="120" width="150" height="40" fill="#FF7A00" rx="8"/>
    <text x="75" y="147" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Accent</text>
    
    <!-- Danger Button -->
    <rect x="0" y="170" width="150" height="40" fill="#FF6B6B" rx="8"/>
    <text x="75" y="197" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Danger</text>
    
    <!-- Success Button -->
    <rect x="0" y="220" width="150" height="40" fill="#4CAF50" rx="8"/>
    <text x="75" y="247" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Success</text>
  </g>
  
  <!-- COLOR PALETTE -->
  <g transform="translate(1050, 70)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#0B6E4F">Color Palette</text>
    
    <!-- Primary -->
    <rect x="0" y="20" width="40" height="40" fill="#007BFF" rx="4"/>
    <text x="50" y="47" font-size="11" fill="#333">Primary</text>
    <text x="50" y="62" font-size="10" fill="#999">#007BFF</text>
    
    <!-- Accent -->
    <rect x="0" y="80" width="40" height="40" fill="#FF7A00" rx="4"/>
    <text x="50" y="107" font-size="11" fill="#333">Accent</text>
    <text x="50" y="122" font-size="10" fill="#999">#FF7A00</text>
    
    <!-- Teal -->
    <rect x="0" y="140" width="40" height="40" fill="#17C3C0" rx="4"/>
    <text x="50" y="167" font-size="11" fill="#333">Teal</text>
    <text x="50" y="182" font-size="10" fill="#999">#17C3C0</text>
    
    <!-- Success -->
    <rect x="0" y="200" width="40" height="40" fill="#4CAF50" rx="4"/>
    <text x="50" y="227" font-size="11" fill="#333">Success</text>
    <text x="50" y="242" font-size="10" fill="#999">#4CAF50</text>
    
    <!-- Danger -->
    <rect x="0" y="260" width="40" height="40" fill="#FF6B6B" rx="4"/>
    <text x="50" y="287" font-size="11" fill="#333">Danger</text>
    <text x="50" y="302" font-size="10" fill="#999">#FF6B6B</text>
  </g>
</svg>