<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg { fill: #ffffff }
    .card { fill: #f7f7f9; stroke: #d0d3d8; }
    .nav { fill: #eef2f5; stroke: #d0d3d8 }
    .title { font: 600 20px/1.2 'Helvetica Neue', Arial; fill: #111 }
    .muted { font: 400 14px/1.2 'Helvetica Neue', Arial; fill: #666 }
    .btn { fill: #0b6e4f; rx:6; ry:6 }
    .btnText{ font: 600 14px/1.2 'Helvetica Neue', Arial; fill:#fff }
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="800"/>
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="70" fill="#0b6e4f"/>
  <text x="20" y="42" class="title" fill="#fff">Jitendra Dhawal Electronics — Voice Rooms</text>
  <text x="1100" y="42" class="muted" fill="#fff">User ▾</text>

  <!-- Left Nav -->
  <rect class="nav" x="20" y="90" width="200" height="640" rx="8"/>
  <text x="40" y="130" class="title">Navigation</text>
  <text x="40" y="160" class="muted">• Home</text>
  <text x="40" y="185" class="muted">• Rooms</text>
  <text x="40" y="210" class="muted">• History</text>
  <text x="40" y="235" class="muted">• Settings</text>
  <text x="40" y="260" class="muted">• Admin</text>

  <!-- Main area -->
  <rect x="240" y="90" width="920" height="640" fill="#fff" stroke="#e6e6e6" rx="8"/>
  <text x="260" y="130" class="title">Available Rooms</text>
  <text x="260" y="155" class="muted">Search · Filter</text>

  <!-- Room cards (3 columns) -->
  <g transform="translate(260,180)">
    <rect class="card" x="0" y="0" width="260" height="120" rx="8"/>
    <text x="12" y="26" class="title">Team Meeting</text>
    <text x="12" y="48" class="muted">3 participants · AI:on</text>
    <rect class="btn" x="140" y="70" width="100" height="32"/>
    <text x="180" y="92" class="btnText">Join</text>

    <rect class="card" x="300" y="0" width="260" height="120" rx="8"/>
    <text x="312" y="26" class="title">Training Room</text>
    <text x="312" y="48" class="muted">5 participants · AI:off</text>
    <rect class="btn" x="440" y="70" width="100" height="32"/>
    <text x="480" y="92" class="btnText">Join</text>

    <rect class="card" x="600" y="0" width="260" height="120" rx="8"/>
    <text x="612" y="26" class="title">Customer Support</text>
    <text x="612" y="48" class="muted">1 participant · AI:on</text>
    <rect class="btn" x="740" y="70" width="100" height="32"/>
    <text x="780" y="92" class="btnText">Join</text>

    <!-- second row -->
    <rect class="card" x="0" y="160" width="260" height="120" rx="8"/>
    <text x="12" y="186" class="title">Classroom</text>
    <text x="12" y="208" class="muted">8 participants · AI:on</text>
    <rect class="btn" x="140" y="230" width="100" height="32"/>
    <text x="180" y="252" class="btnText">Join</text>

  </g>

  <!-- Footer -->
  <text x="20" y="770" class="muted">Help · Docs · Contact</text>
</svg>